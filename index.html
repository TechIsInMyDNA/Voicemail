<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Leave a Voice Message</title>
<style>
body{
font-family:sans-serif;
text-align:center;
padding:30px;
}
button{
font-size:18px;
padding:12px 20px;
margin:10px;
}
</style>
</head>
<body><h2>Leave a Voice Message</h2><button id="record">🎤 Start Recording</button>
<button id="stop" disabled>⏹ Stop</button>
<button id="send" disabled>📤 Send</button>

<p id="status"></p><script>
let mediaRecorder;
let chunks=[];
let audioBlob;

const API_URL="https://holy-tree-6dda.shubhamagr144.workers.dev/";

document.getElementById("record").onclick=async()=>{

const stream=await navigator.mediaDevices.getUserMedia({audio:true});

mediaRecorder=new MediaRecorder(stream);

chunks=[];

mediaRecorder.ondataavailable=e=>{
chunks.push(e.data);
};

mediaRecorder.onstop=()=>{
audioBlob=new Blob(chunks,{type:"audio/ogg"});
document.getElementById("send").disabled=false;
};

mediaRecorder.start();

document.getElementById("record").disabled=true;
document.getElementById("stop").disabled=false;

document.getElementById("status").innerText="Recording...";
};

document.getElementById("stop").onclick=()=>{

mediaRecorder.stop();

document.getElementById("stop").disabled=true;

document.getElementById("status").innerText="Recording stopped";
};

document.getElementById("send").onclick=async()=>{

const fd=new FormData();

fd.append("audio",audioBlob,"voicemail.ogg");

document.getElementById("status").innerText="Uploading...";

const r=await fetch(API_URL,{
method:"POST",
body:fd
});

document.getElementById("status").innerText="Voice message sent. Thank you!";
};
</script></body>
</html>
